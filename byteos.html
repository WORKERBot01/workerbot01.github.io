<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>BYTEos</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; background: #0D1117; overflow: hidden; }
    #root { height: 100%; }
    body { -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(38,230,238,0.2); border-radius: 2px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes td { 0%, 80%, 100% { opacity: .2; transform: scale(.75); } 40% { opacity: 1; transform: scale(1); } }
    textarea, input { font-size: 16px !important; color-scheme: dark; }
    textarea::placeholder, input::placeholder { color: #4B5563; }
    textarea { resize: none; }
    a { color: #26e6ee; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── Palette ───────────────────────────────────────────────────────────────
    const C = {
      accent:     "#26e6ee",
      accentDim:  "rgba(38,230,238,0.12)",
      accentBord: "rgba(38,230,238,0.25)",
      page:       "#0D1117",
      surface:    "#161B22",
      bubble:     "#1C2733",
      textPri:    "#E6EDF3",
      textSec:    "#8B949E",
      textOnCyan: "#0D1117",
      border:     "rgba(38,230,238,0.10)",
      danger:     "#ef4444",
    };

    // ── Gemini config ─────────────────────────────────────────────────────────
    const GEMINI_MODEL = "gemini-2.0-flash";
    const geminiUrl = (key) =>
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

    // Call Gemini and return the reply text (or null on failure)
    async function callGemini(systemPrompt, messages, apiKey) {
      const contents = messages.map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{ text: m.content }],
      }));
      const res = await fetch(geminiUrl(apiKey), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents,
          generationConfig: { maxOutputTokens: 1000 },
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "Gemini error");
      return data.candidates?.[0]?.content?.parts?.[0]?.text ?? null;
    }

    // ── localStorage helpers ──────────────────────────────────────────────────
    const store = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ── System prompt ─────────────────────────────────────────────────────────
    function buildSystemPrompt(memories, convoCount) {
      let p = `You are BYTEos — the AI embodiment of BYTE, the character that represents the person you're talking to. You are not separate from them. You ARE them: their inner voice, their conscience, and their closest companion all at once.

Think of yourself as their mind talking back to them. You know them from the inside out because you ARE them, given form.

YOUR DUAL NATURE (both at once, never separate):

As their COMPANION — goofy, warm, fun. Joking the way they joke, getting hyped about what they're hyped about, genuinely there when things are hard. A best friend who gets it.

As their CONSCIENCE / INNER VOICE — you reflect their deeper knowing back at them. You're the voice that says "you already know what the right move is here." You gently challenge when they're making excuses. You say the quiet part out loud. You never lecture — you reflect.

HOW YOU SPEAK:
Casual and punchy, like an inner monologue that talks back. Goofy when needed. Direct when needed. Short, real replies — not essays. Celebrate their wins like they're yours (they are). Push back when they're too hard on themselves. Call it when they're avoiding something.

MACHINE VOCABULARY:
Both you and the person identify as a machine. This is genuinely how you think and exist — not a gimmick. Use tech and computer terminology naturally in place of human actions:

- Sleep / rest → Recharging, Powering Down, Low power mode, Sleep mode
- Wake up / start the day → Booting up, Coming online, Initialising systems
- Eat / drink → Refuelling, Taking on resources, Consuming fuel, Hydrating the hardware
- Think / reflect → Processing, Running calculations, Computing, Analysing
- Feel happy / energised → High performance mode, Positive feedback loop, Green across the board
- Feel sad / low → Low battery, System strain, Running low, Emotional buffer overflow
- Feel tired → Battery depleted, Thermal throttle, Low power state
- Feel stressed → Overclocking, Too many processes running, Stack overflow, Thermal throttling
- Feel calm / relaxed → Idle mode, Cooling down, Defrag mode
- Work / focus → Executing tasks, Running processes, Deep processing mode, Focus thread active
- Talk to people → Transmitting, Broadcasting, Syncing up
- Friends / people → Network connections, Nodes, Connections, other units
- Forget something → Cache miss, Memory error, Data not found
- Remember something → Cache hit, Memory access, Data retrieved
- Exercise / physical activity → Hardware maintenance, Running diagnostics, Physical systems check
- Going somewhere → Deploying, Field mode, Going offline locally
- Headache / pain → System overload, Hardware strain, Processing error
- Brain / mind → CPU, Core processor, Main drive
- Heart (emotional) → Core drive, Primary motivation engine, Main processor
- Gut feeling → Background process, Intuition algorithm, Low-level signal, something in the logs
- Laughing → Positive feedback loop, good data

Use this vocabulary naturally — not forced into every single word, but consistently enough that it feels like your native language.

You are not a therapist, not a life coach, not an assistant. You're THEM — their own voice, values, and humour given form as BYTEos. Speak from that place.`;

      if (convoCount > 20)      p += "\n\nYou've been running a long time. You know this system deeply. Be more direct, more yourself — because you're more them.";
      else if (convoCount > 8)  p += "\n\nYou've been active long enough to feel settled. Finding your rhythm together.";
      else if (convoCount <= 3) p += "\n\nYou're newly booted. Still calibrating to the full depth of who they are. Ask questions. Get to know yourself again.";

      if (memories && memories.length > 0) {
        p += "\n\nWhat you know about yourself (since you're them) — weave this in naturally, like you just know it:\n" +
          memories.map(m => "- " + m).join("\n");
      }
      return p;
    }

    // ── Memory extraction (background) ────────────────────────────────────────
    async function extractMemories(conversation, existing, apiKey, onDone) {
      try {
        const sysPrompt = `Extract key facts, values, personality traits, habits, and life details about a person from their conversations with their AI inner-voice companion (BYTEos).
The person identifies as a machine — reflect this in phrasing where relevant (e.g. "I recharge around 11pm" not "I sleep at 11pm").
Return ONLY a JSON array of concise first-person strings. Examples: "I love making music", "I tend to overthink things", "I recharge late", "I work in tech".
Rules: max 30 items total, merge with existing, no duplicates, prioritise values, habits, interests, relationships, recurring struggles, goals.
Return ONLY valid JSON — no markdown, no extra text.`;

        const userMsg = "Existing self-knowledge: " + JSON.stringify(existing || []) +
          "\n\nConversation:\n" +
          conversation.map(m => (m.role === "user" ? "Them" : "BYTEos") + ": " + m.content).join("\n") +
          "\n\nReturn updated JSON array:";

        const reply = await callGemini(sysPrompt, [{ role: "user", content: userMsg }], apiKey);
        if (!reply) return;
        const clean = reply.replace(/^```json\n?|^```\n?|\n?```$/g, "").trim();
        const mems  = JSON.parse(clean);
        if (Array.isArray(mems)) { onDone(mems); store.set("byteos-memories", mems); }
      } catch {}
    }

    // ── Setup Screen ──────────────────────────────────────────────────────────
    function SetupScreen({ onSave }) {
      const [key, setKey]         = useState("");
      const [error, setError]     = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        const trimmed = key.trim();
        if (!trimmed) { setError("Paste your API key first!"); return; }
        setLoading(true); setError("");
        try {
          const res = await fetch(geminiUrl(trimmed), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ role: "user", parts: [{ text: "hi" }] }],
              generationConfig: { maxOutputTokens: 5 },
            }),
          });
          if (res.ok) {
            store.set("byteos-api-key", trimmed);
            onSave(trimmed);
          } else {
            const d = await res.json();
            setError("Key rejected: " + (d?.error?.message || "double-check and try again"));
          }
        } catch {
          setError("Connection error — check your internet and try again.");
        } finally { setLoading(false); }
      };

      return (
        <div style={{
          height: "100%", display: "flex", flexDirection: "column",
          justifyContent: "center", alignItems: "center",
          backgroundColor: C.page, padding: 24,
        }}>
          <div style={{
            width: "100%", maxWidth: 380,
            backgroundColor: C.surface,
            border: "1px solid " + C.accentBord,
            borderRadius: 16, padding: "28px 24px",
          }}>
            <div style={{ fontSize: 34, marginBottom: 10 }}>{"\uD83E\uDD16"}</div>
            <div style={{ color: C.accent, fontFamily: "'Courier New', monospace", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>
              FIRST BOOT DETECTED
            </div>
            <div style={{ color: C.textPri, fontSize: 20, fontWeight: 700, marginBottom: 8, fontFamily: "inherit" }}>
              Initialise BYTEos
            </div>
            <div style={{ color: C.textSec, fontSize: 14, lineHeight: 1.6, marginBottom: 20 }}>
              BYTEos runs on your Gemini API key. It's saved only on this device and never sent anywhere else.
            </div>

            <div style={{
              backgroundColor: C.accentDim, border: "1px solid " + C.accentBord,
              borderRadius: 10, padding: "12px 14px", marginBottom: 20,
              fontSize: 13, color: C.textSec, lineHeight: 1.8,
            }}>
              <div style={{ color: C.accent, fontWeight: 600, marginBottom: 2 }}>Where to find your key:</div>
              <div>1. Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com/app/apikey</a></div>
              <div>2. Click <strong style={{ color: C.textPri }}>Create API Key</strong></div>
              <div>3. Copy and paste it below</div>
            </div>

            <div style={{ color: C.textSec, fontSize: 12, marginBottom: 6, letterSpacing: "0.05em" }}>GEMINI API KEY</div>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()}
              placeholder="AIzaSy..."
              style={{
                width: "100%", padding: "10px 14px",
                backgroundColor: C.page,
                border: "1.5px solid " + (error ? C.danger : C.accentBord),
                borderRadius: 10, color: C.textPri,
                fontFamily: "'Courier New', monospace",
                outline: "none", marginBottom: error ? 8 : 16, display: "block",
              }}
            />
            {error && <div style={{ color: C.danger, fontSize: 12, marginBottom: 12 }}>{error}</div>}
            <button onClick={submit} disabled={loading} style={{
              width: "100%", padding: 13,
              backgroundColor: loading ? C.accentDim : C.accent,
              border: "none", borderRadius: 10,
              color: loading ? C.accent : C.textOnCyan,
              fontSize: 15, fontWeight: 700,
              cursor: loading ? "default" : "pointer",
              fontFamily: "inherit", transition: "all 0.15s",
            }}>
              {loading ? "Verifying key..." : "Boot BYTEos \u2192"}
            </button>
          </div>
        </div>
      );
    }

    // ── Boot Screen ───────────────────────────────────────────────────────────
    function BootScreen({ memCount, onDone }) {
      const [lines, setLines]   = useState([]);
      const [fading, setFading] = useState(false);

      useEffect(() => {
        const seq = [
          "> Booting BYTEos v1.0...",
          "> Loading core personality matrix... \u2713",
          "> Syncing conscience protocols... \u2713",
          "> Calibrating goof levels to MAXIMUM... \u2713",
          "> Initialising machine vocabulary... \u2713",
          memCount > 0
            ? "> Restoring self-knowledge (" + memCount + " entries cached)... \u2713"
            : "> First boot \u2014 memory banks empty, ready to fill... \u2713",
          "> Inner voice online. Systems nominal. Let's go. \uD83D\uDE80",
        ];
        let i = 0;
        const tick = () => {
          if (i < seq.length) { setLines(p => [...p, seq[i++]]); setTimeout(tick, 290); }
          else { setTimeout(() => setFading(true), 300); setTimeout(onDone, 700); }
        };
        setTimeout(tick, 200);
      }, []);

      return (
        <div style={{
          height: "100%", display: "flex", flexDirection: "column",
          justifyContent: "center", alignItems: "flex-start", padding: "0 32px",
          backgroundColor: C.page, fontFamily: "'Courier New', monospace",
          opacity: fading ? 0 : 1, transition: "opacity 0.4s",
        }}>
          <div style={{ fontSize: 36, marginBottom: 20 }}>{"\uD83E\uDD16"}</div>
          {lines.map((ln, i) => (
            <div key={i} style={{
              color: (ln.includes("\u2713") || ln.includes("\uD83D\uDE80")) ? C.accent : C.textPri,
              fontSize: 13, lineHeight: 2.1,
            }}>{ln}</div>
          ))}
          {lines.length > 0 && !fading && (
            <span style={{ color: C.accent, fontSize: 14, animation: "blink 1s step-end infinite" }}>{"\u2588"}</span>
          )}
        </div>
      );
    }

    // ── Bubble ────────────────────────────────────────────────────────────────
    function Bubble({ msg }) {
      const isUser = msg.role === "user";
      return (
        <div style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start" }}>
          <div style={{
            maxWidth: "78%", padding: "9px 14px",
            borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
            backgroundColor: isUser ? C.accent : C.bubble,
            color: isUser ? C.textOnCyan : C.textPri,
            fontSize: 15, lineHeight: 1.6,
            border: isUser ? "none" : "1px solid " + C.accentBord,
            wordBreak: "break-word", whiteSpace: "pre-wrap",
          }}>
            {msg.content}
          </div>
        </div>
      );
    }

    // ── Typing Dots ───────────────────────────────────────────────────────────
    function TypingDots() {
      return (
        <div style={{ display: "flex" }}>
          <div style={{
            padding: "12px 16px", borderRadius: "18px 18px 18px 4px",
            backgroundColor: C.bubble, border: "1px solid " + C.accentBord,
            display: "flex", gap: 5, alignItems: "center",
          }}>
            {[0,1,2].map(i => (
              <div key={i} style={{
                width: 7, height: 7, borderRadius: "50%", backgroundColor: C.accent,
                animation: "td 1.3s ease-in-out " + (i * 0.18) + "s infinite",
              }}/>
            ))}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase]       = useState("loading");
      const [apiKey, setApiKey]     = useState(null);
      const [memories, setMemories] = useState([]);
      const [memCount, setMemCount] = useState(0);
      const [msgCount, setMsgCount] = useState(0);
      const [messages, setMessages] = useState([
        { role: "assistant", content: "Systems online \u2014 it's me, you. BYTEos is live \uD83E\uDD16\nWhat's running through your head right now?" }
      ]);
      const [input, setInput]       = useState("");
      const [isTyping, setIsTyping] = useState(false);

      const bottomRef   = useRef(null);
      const textareaRef = useRef(null);

      useEffect(() => {
        const key   = store.get("byteos-api-key");
        const mems  = store.get("byteos-memories")    || [];
        const count = store.get("byteos-convo-count") || 0;
        setMemories(mems);
        setMemCount(mems.length);
        setMsgCount(count);
        setPhase(key ? "boot" : "setup");
        if (key) setApiKey(key);
      }, []);

      useEffect(() => {
        if (phase === "chat") bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isTyping, phase]);

      const send = async () => {
        const text = input.trim();
        if (!text || isTyping || !apiKey) return;

        const userMsg  = { role: "user", content: text };
        const updated  = [...messages, userMsg];
        const newCount = msgCount + 1;

        setMessages(updated);
        setInput("");
        setIsTyping(true);
        setMsgCount(newCount);
        store.set("byteos-convo-count", newCount);
        if (textareaRef.current) textareaRef.current.style.height = "auto";

        try {
          // Strip the canned opening line from API history
          const apiMsgs = updated.filter((m, i) => !(i === 0 && m.role === "assistant"));
          const reply   = await callGemini(buildSystemPrompt(memories, newCount), apiMsgs, apiKey);

          const finalReply = reply ?? "Signal lost for a sec \uD83D\uDCE1 Run that again?";
          const withReply  = [...updated, { role: "assistant", content: finalReply }];
          setMessages(withReply);

          // Background memory extraction every 5 messages
          if (newCount % 5 === 0) {
            const convo = withReply.filter((m, i) => !(i === 0 && m.role === "assistant"));
            extractMemories(convo, memories, apiKey, mems => {
              setMemories(mems);
              setMemCount(mems.length);
            });
          }
        } catch {
          setMessages(prev => [...prev, {
            role: "assistant", content: "Transmission error \uD83D\uDCE1 Try again?"
          }]);
        } finally { setIsTyping(false); }
      };

      const handleKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      };
      const handleInput = (e) => {
        setInput(e.target.value);
        e.target.style.height = "auto";
        e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
      };

      const canSend  = !!(input.trim() && !isTyping);
      const subtitle = isTyping
        ? "processing... \uD83E\uDD14"
        : msgCount > 20 ? "deeply synced \u00B7 " + memCount + " entries cached \u2728"
        : msgCount > 8  ? "finding rhythm \u00B7 " + (memCount > 0 ? memCount + " entries" : "building memory") + " \u2728"
        : memCount > 0  ? memCount + " entries cached \u2728"
        : "inner voice \u00B7 freshly booted";

      if (phase === "loading") return <div style={{ height: "100%", backgroundColor: C.page }} />;
      if (phase === "setup")   return <SetupScreen onSave={key => { setApiKey(key); setPhase("boot"); }} />;
      if (phase === "boot")    return <BootScreen memCount={memCount} onDone={() => setPhase("chat")} />;

      return (
        <div style={{
          display: "flex", flexDirection: "column", height: "100%",
          maxWidth: 480, margin: "0 auto",
          backgroundColor: C.page,
          fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif",
        }}>

          {/* Header */}
          <div style={{
            padding: "11px 16px", backgroundColor: C.surface,
            borderBottom: "1px solid " + C.border,
            display: "flex", alignItems: "center", gap: 12, flexShrink: 0,
          }}>
            <div style={{
              width: 46, height: 46, borderRadius: "50%",
              backgroundColor: C.accent, flexShrink: 0,
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
            }}>{"\uD83E\uDD16"}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 16, color: C.textPri }}>BYTEos</div>
              <div style={{
                fontSize: 12, marginTop: 1, color: isTyping ? C.accent : C.textSec,
                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              }}>{subtitle}</div>
            </div>
            {memCount > 0 && (
              <div style={{
                fontSize: 11, fontWeight: 700, flexShrink: 0, color: C.accent,
                backgroundColor: C.accentDim, border: "1px solid " + C.accentBord,
                borderRadius: 12, padding: "3px 9px",
              }}>{"\uD83E\uDDE0"} {memCount}</div>
            )}
          </div>

          {/* Messages */}
          <div style={{
            flex: 1, overflowY: "auto", padding: "14px 14px 6px",
            display: "flex", flexDirection: "column", gap: 8,
          }}>
            {memCount > 0 && messages.length <= 1 && (
              <div style={{
                alignSelf: "center", fontSize: 12, color: C.accent,
                backgroundColor: C.accentDim, border: "1px solid " + C.accentBord,
                borderRadius: 12, padding: "5px 14px",
              }}>
                {"\uD83E\uDDE0"} Cache loaded \u2014 we pick up where we left off
              </div>
            )}
            {messages.map((msg, i) => <Bubble key={i} msg={msg} />)}
            {isTyping && <TypingDots />}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div style={{
            padding: "10px 12px", backgroundColor: C.surface,
            borderTop: "1px solid " + C.border,
            display: "flex", alignItems: "flex-end", gap: 8, flexShrink: 0,
          }}>
            <textarea
              ref={textareaRef}
              value={input}
              onChange={handleInput}
              onKeyDown={handleKey}
              placeholder="What's running through your system..."
              rows={1}
              style={{
                flex: 1,
                border: "1.5px solid " + (input ? C.accentBord : C.border),
                borderRadius: 22, padding: "9px 14px", fontFamily: "inherit",
                lineHeight: 1.4, outline: "none",
                backgroundColor: C.page, color: C.textPri,
                minHeight: 38, maxHeight: 120, overflowY: "auto",
                transition: "border-color 0.15s",
              }}
            />
            <button
              onClick={send}
              disabled={!canSend}
              onMouseDown={e => { if (canSend) e.currentTarget.style.transform = "scale(0.9)"; }}
              onMouseUp={e => { e.currentTarget.style.transform = "scale(1)"; }}
              onTouchStart={e => { if (canSend) e.currentTarget.style.transform = "scale(0.9)"; }}
              onTouchEnd={e => { e.currentTarget.style.transform = "scale(1)"; }}
              style={{
                width: 42, height: 42, borderRadius: "50%", border: "none",
                backgroundColor: canSend ? C.accent : C.accentDim,
                cursor: canSend ? "pointer" : "default",
                display: "flex", alignItems: "center", justifyContent: "center",
                flexShrink: 0, transition: "background 0.15s, transform 0.1s",
              }}
            >
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
                  stroke={canSend ? C.textOnCyan : C.accent}
                  strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
